---
layout: default
---
<article class="page-wrap post">
  <header class="post-header">
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.tags.size > 0 %}
        · {% for tag in page.tags %}<span class="tag">#{{ tag }}</span> {% endfor %}
      {% endif %}
    </p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.excerpt and page.show_excerpt %}<p class="post-lead">{{ page.excerpt | strip_html }}</p>{% endif %}
  </header>

  <div class="content prose">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a class="back-link" href="{{ '/articles/' | relative_url }}">← All articles</a>
  </footer>
</article>
